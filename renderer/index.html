<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>Mouse Jiggler</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --accent: #0066CC;
        --green:  #34C759;
        --red:    #FF3B30;
        --ink:    #1d1d1f;
        --dim:    #6e6e73;
        --border: rgba(0,0,0,0.10);
        --bg:     #f2f2f7;
        --surface:#ffffff;
      }

      html, body {
        width: 280px;
        height: 260px;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
      }

      body { display: flex; flex-direction: column; }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px 11px;
        background: var(--surface);
        border-bottom: 0.5px solid var(--border);
        flex-shrink: 0;
      }

      .app-icon {
        width: 32px;
        height: 32px;
        border-radius: 7px;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .app-icon svg { display: block; }

      .app-meta { flex: 1; min-width: 0; }

      .app-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
        line-height: 1.2;
      }

      .app-sub {
        font-size: 11px;
        font-weight: 400;
        color: var(--dim);
        margin-top: 1px;
      }

      /* Status badge in header */
      .status-badge {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        font-weight: 500;
        color: var(--dim);
        flex-shrink: 0;
      }

      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--dim);
        transition: background 0.2s;
      }

      .status-dot.on  { background: var(--green); }
      .status-dot.off { background: var(--dim); }

      /* ── Form rows ── */
      .content {
        flex: 1;
        background: var(--surface);
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .row {
        display: flex;
        align-items: center;
        padding: 0 14px;
        height: 44px;
        border-bottom: 0.5px solid var(--border);
      }

      .row-label {
        font-size: 13px;
        font-weight: 400;
        color: var(--ink);
        flex: 1;
      }

      .row-value {
        display: flex;
        align-items: center;
      }

      input[type='number'] {
        width: 52px;
        background: var(--bg);
        border: 0.5px solid var(--border);
        border-radius: 6px;
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        font-weight: 400;
        font-size: 13px;
        padding: 3px 6px;
        outline: none;
        text-align: right;
        -webkit-font-smoothing: antialiased;
      }

      input[type='number']:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(0,102,204,0.2);
      }

      /* Hide native checkbox */
      input[type='checkbox'] {
        opacity: 0;
        position: absolute;
        width: 0; height: 0;
        pointer-events: none;
      }

      .checkbox-label {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 1.5px solid var(--border);
        border-radius: 4px;
        background: var(--bg);
        cursor: pointer;
        flex-shrink: 0;
        position: relative;
        transition: background 0.1s, border-color 0.1s;
      }

      input[type='checkbox']:checked + .checkbox-label {
        background: var(--accent);
        border-color: var(--accent);
      }

      input[type='checkbox']:checked + .checkbox-label::after {
        content: '';
        position: absolute;
        left: 3px; top: 1px;
        width: 5px; height: 9px;
        border: 1.5px solid #fff;
        border-top: none;
        border-left: none;
        transform: rotate(45deg);
      }

      /* ── Button row ── */
      .btn-row {
        display: flex;
        align-items: center;
        padding: 10px 14px;
        gap: 8px;
        flex-shrink: 0;
        background: var(--bg);
      }

      button {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        font-weight: 400;
        font-size: 13px;
        border-radius: 8px;
        cursor: pointer;
        height: 32px;
        -webkit-font-smoothing: antialiased;
        transition: opacity 0.1s;
      }

      button:active { opacity: 0.7; }

      #quit {
        flex: 1;
        background: var(--surface);
        color: var(--ink);
        border: 0.5px solid var(--border);
      }

      #quit:hover { background: #e8e8ed; }

      #toggle {
        flex: 2;
        background: var(--accent);
        color: #fff;
        border: none;
        font-weight: 500;
      }

      #toggle:hover { opacity: 0.88; }
      #toggle.running { background: var(--red); }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="app-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="4" stroke="white" stroke-width="1.5"/>
          <circle cx="9" cy="9" r="1.5" fill="white"/>
          <line x1="9" y1="2" x2="9" y2="0.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="9" y1="17.5" x2="9" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="9" x2="0.5" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="17.5" y1="9" x2="16" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="app-meta">
        <div class="app-name">Mouse Jiggler</div>
        <div class="app-sub">Keep-alive utility</div>
      </div>
      <div class="status-badge">
        <div class="status-dot off" id="status-dot"></div>
        <span id="status">Idle</span>
      </div>
    </div>

    <div class="content">
      <div class="row">
        <span class="row-label">Interval (seconds)</span>
        <div class="row-value">
          <input id="interval" type="number" min="1" max="3600" step="1" value="10">
        </div>
      </div>

      <div class="row">
        <span class="row-label">Pause on user input</span>
        <div class="row-value">
          <input id="pause" type="checkbox" checked>
          <label class="checkbox-label" for="pause"></label>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button id="quit">Quit</button>
      <button id="toggle">Start</button>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
