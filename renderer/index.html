<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>Mouse Jiggler</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --blue:   #007AFF;
        --ink:    #1c1c1e;
        --dim:    #6e6e73;
        --border: rgba(0,0,0,0.12);
        --bg:     #f5f5f7;
      }

      html, body {
        width: 280px;
        height: 260px;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      /* ── Top accent bar ── */
      .rule-top {
        height: 3px;
        background: var(--blue);
        flex-shrink: 0;
      }

      /* ── Masthead / header ── */
      .header {
        padding: 8px 16px 6px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        background: #ffffff;
      }

      .pub-label {
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--dim);
        margin-bottom: 2px;
      }

      h1 {
        font-family: "New York", "Georgia", serif;
        font-size: 24px;
        font-weight: 700;
        font-style: italic;
        color: var(--ink);
        line-height: 0.95;
        letter-spacing: -0.01em;
      }

      .masthead-tagline {
        margin-top: 4px;
      }

      .masthead-tagline .hairline {
        display: block;
        height: 0.5px;
        background: var(--border);
      }

      .vol-info {
        font-size: 8px;
        font-weight: 400;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--dim);
        text-align: center;
        padding: 2px 0;
      }

      /* ── Content ── */
      .content {
        flex: 1;
        padding: 0 16px;
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: #ffffff;
      }

      .status-row,
      .row {
        display: flex;
        align-items: center;
        padding: 11px 0;
        border-bottom: 0.5px solid var(--border);
      }

      .status-label {
        font-size: 12px;
        font-weight: 500;
        color: var(--dim);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* Blue dot when running */
      .status-row:has(#status.on) .status-label::before {
        content: '';
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--blue);
        flex-shrink: 0;
      }

      #status {
        font-size: 13px;
        font-weight: 600;
        margin-left: auto;
        color: var(--ink);
      }

      #status.on { color: var(--blue); }

      .row .row-label {
        font-size: 12px;
        font-weight: 500;
        color: var(--dim);
      }

      .row-value {
        margin-left: auto;
        display: flex;
        align-items: center;
      }

      input[type='number'] {
        width: 48px;
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--border);
        border-radius: 0;
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        font-weight: 600;
        font-size: 13px;
        padding: 1px 0;
        outline: none;
        text-align: right;
        -webkit-font-smoothing: antialiased;
      }

      input[type='number']:focus {
        border-bottom-color: var(--blue);
        border-bottom-width: 1.5px;
      }

      /* Hide native checkbox */
      input[type='checkbox'] {
        opacity: 0;
        position: absolute;
        width: 0;
        height: 0;
        pointer-events: none;
      }

      /* macOS-style rounded checkbox */
      .checkbox-label {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 1.5px solid var(--border);
        border-radius: 4px;
        background: #f0f0f0;
        cursor: pointer;
        flex-shrink: 0;
        position: relative;
        transition: background 0.1s, border-color 0.1s;
      }

      input[type='checkbox']:checked + .checkbox-label {
        background: var(--blue);
        border-color: var(--blue);
      }

      input[type='checkbox']:checked + .checkbox-label::after {
        content: '';
        position: absolute;
        left: 3px;
        top: 1px;
        width: 5px;
        height: 9px;
        border: 2px solid #fff;
        border-top: none;
        border-left: none;
        transform: rotate(45deg);
      }

      /* ── Pause row ── */
      .pause-row {
        display: flex;
        align-items: center;
        height: 36px;
        padding: 0;
      }

      .pause-row .row-label {
        font-size: 12px;
        font-weight: 500;
        color: var(--dim);
      }

      /* ── Button row ── */
      .btn-row {
        height: 44px;
        display: flex;
        align-items: center;
        padding: 0 12px 10px;
        gap: 8px;
        flex-shrink: 0;
        background: var(--bg);
      }

      button {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        font-weight: 500;
        font-size: 13px;
        border-radius: 6px;
        cursor: pointer;
        transition: opacity 0.1s;
        -webkit-font-smoothing: antialiased;
      }

      button:active { opacity: 0.75; }

      #quit {
        flex: 4;
        background: #ffffff;
        color: var(--ink);
        border: 1px solid var(--border);
      }

      #quit:hover { background: #ebebeb; }

      #toggle {
        flex: 6;
        background: var(--blue);
        color: #fff;
        border: none;
      }

      #toggle:hover { opacity: 0.85; }

      #toggle.running {
        background: #ff3b30;
      }
    </style>
  </head>
  <body>
    <div class="rule-top"></div>

    <div class="header">
      <div class="pub-label">Utility &mdash; Mouse Control</div>
      <h1>Mouse<br>Jiggler</h1>
      <div class="masthead-tagline">
        <span class="hairline"></span>
        <div class="vol-info">Vol. 1 &nbsp;&bull;&nbsp; System Tray Edition</div>
        <span class="hairline"></span>
      </div>
    </div>

    <div class="content">
      <div class="status-row">
        <span class="status-label">Status</span>
        <span id="status" class="off">Idle</span>
      </div>

      <div class="row">
        <span class="row-label">Interval (seconds)</span>
        <div class="row-value">
          <input id="interval" type="number" min="1" max="3600" step="1" value="10">
        </div>
      </div>

      <div class="pause-row">
        <span class="row-label">Pause on user input</span>
        <div class="row-value">
          <input id="pause" type="checkbox" checked>
          <label class="checkbox-label" for="pause"></label>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button id="quit">Quit</button>
      <button id="toggle">Start</button>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
