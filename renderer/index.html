<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>Mouse Jiggler</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      }
      body {
        margin: 0;
        padding: 14px 16px;
        font-size: 13px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 10px 0;
      }
      .status {
        padding: 2px 8px;
        border-radius: 999px;
        font-weight: 600;
      }
      .status.on {
        background: rgba(52, 199, 89, 0.2);
        color: rgb(30, 120, 60);
      }
      .status.off {
        background: rgba(142, 142, 147, 0.2);
        color: rgb(90, 90, 95);
      }
      button {
        font: inherit;
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        background: rgba(255, 255, 255, 0.6);
        cursor: pointer;
      }
      button.primary {
        background: rgb(10, 132, 255);
        color: white;
        border-color: transparent;
      }
      input[type='number'] {
        width: 72px;
        font: inherit;
        padding: 3px 6px;
        border-radius: 4px;
        border: 1px solid rgba(0, 0, 0, 0.15);
      }
      .footer {
        margin-top: 14px;
        display: flex;
        justify-content: space-between;
      }
    </style>
  </head>
  <body>
    <h1>Mouse Jiggler</h1>

    <div class="row">
      <span>Status</span>
      <span id="status" class="status off">Idle</span>
    </div>

    <div class="row">
      <label for="interval">Interval (s)</label>
      <input id="interval" type="number" min="1" max="3600" step="1" />
    </div>

    <div class="row">
      <label for="pause">Pause on user input</label>
      <input id="pause" type="checkbox" />
    </div>

    <div class="row">
      <button id="toggle" class="primary">Start</button>
    </div>

    <div class="footer">
      <button id="quit">Quit</button>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
